# Test profile configuration
# Uses H2 in-memory database for tests

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis for unit tests (service should handle Redis failures gracefully)
spring.data.redis.host=localhost
spring.data.redis.port=63799

# Disable RabbitMQ for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=56729

# JWT Configuration (test secret)
jwt.issuer=fitunity-auth-test
jwt.audience=fitunity-client-test
jwt.access-token-expiry-minutes=15
jwt.refresh-token-expiry-days=30
jwt.refresh-token-inactivity-days=7
jwt.secret=test-secret-key-for-unit-tests-minimum-32-chars

# Disable auto-configuration for security during tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# H2 Console (for debugging tests)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
