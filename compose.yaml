version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fitunity-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: fitunity_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - fitunity-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitunity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fitunity-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitunity-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fitunity_auth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RABBITMQ_USER: ${RABBITMQ_USER:-fitunity}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-dev_password}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitunity-network

networks:
  fitunity-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
